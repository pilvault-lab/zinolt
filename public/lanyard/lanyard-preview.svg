<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 270 480" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bg" cx="50%" cy="55%" r="65%">
      <stop offset="0%" stop-color="#3a3a3f" />
      <stop offset="55%" stop-color="#18181b" />
      <stop offset="100%" stop-color="#070708" />
    </radialGradient>
    <linearGradient id="cardShadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(0,0,0,0.18)" />
      <stop offset="100%" stop-color="rgba(0,0,0,0)" />
    </linearGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14" />
    </filter>
  </defs>

  <!-- Backdrop -->
  <rect width="270" height="480" fill="url(#bg)" />

  <!-- Floating drop shadow -->
  <ellipse cx="135" cy="345" rx="105" ry="22" fill="rgba(0,0,0,0.55)" filter="url(#soft)" />

  <!-- Strap -->
  <rect x="115" y="0" width="40" height="135" fill="#0A0A0A" />
  <!-- ZINOLT mark on strap -->
  <text x="135" y="78" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif"
        font-size="9" font-weight="700"
        letter-spacing="2"
        fill="#FFFFFF">ZINOLT</text>

  <!-- Clip hardware -->
  <rect x="118" y="125" width="34" height="22" rx="3" fill="#a8a8ab" />
  <rect x="121" y="128" width="28" height="16" rx="2" fill="#7a7a7d" />

  <!-- Card -->
  <rect x="40" y="150" width="190" height="240" rx="14" fill="#FAFAFA" stroke="rgba(0,0,0,0.05)" />
  <rect x="40" y="150" width="190" height="55" rx="14" fill="url(#cardShadow)" />

  <!-- Card content placeholder -->
  <text x="60" y="178" font-family="Helvetica, Arial, sans-serif" font-size="8" letter-spacing="2" fill="rgba(10,10,10,0.45)">FROM THE STUDIO</text>
  <text x="60" y="240" font-family="Georgia, serif" font-size="44" fill="rgba(10,10,10,0.15)">“</text>
  <text x="60" y="290" font-family="Georgia, serif" font-size="18" fill="#0A0A0A">A piece of</text>
  <text x="60" y="310" font-family="Georgia, serif" font-size="18" fill="#0A0A0A">clay only</text>
  <text x="60" y="330" font-family="Georgia, serif" font-size="18" fill="#0A0A0A">knows.</text>

  <!-- Footer dots -->
  <circle cx="125" cy="375" r="2" fill="rgba(10,10,10,0.4)" />
  <text x="135" y="378" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="7" letter-spacing="2" fill="rgba(10,10,10,0.4)">ZINOLT</text>
  <circle cx="160" cy="375" r="2" fill="rgba(10,10,10,0.4)" />
</svg>
